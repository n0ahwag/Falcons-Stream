<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lineup Control - MultiTeam</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* CSS bleibt identisch mit der vorherigen Version */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .nav a { color: #888; text-decoration: none; font-size: 12px; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; }
        select.team-select { width: 100%; max-width: 500px; padding: 12px; background: #ff4444; border: none; border-radius: 8px; color: white; font-weight: bold; margin-bottom: 20px; font-family: inherit; }
        .auto-btn { background: #444; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; }
        .line-section { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; border: 1px solid #333; }
        .pitch { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .pitch-row { display: flex; gap: 10px; }
        .player-input-box { background: #252525; padding: 5px; border-radius: 6px; width: 130px; border: 1px solid #444; }
        .player-input-box label { font-size: 8px; color: #ff4444; font-weight: bold; display: block; }
        .player-input-box input { width: 40px; background: transparent; border: none; color: white; border-bottom: 1px solid #444; font-weight: bold; }
        .player-input-box span { font-size: 10px; color: #aaa; display: block; overflow: hidden; white-space: nowrap; }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-save { background: #28a745; color: white; }
        .btn-show { background: #ff4444; color: white; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="admin.html">← Events</a>
        <a href="management.html">Spielerliste</a>
    </div>

    <select id="teamSelector" class="team-select" onchange="changeTeam()">
        <option value="2bundesliga">2. Bundesliga</option>
        <option value="regio">Regio</option>
        <option value="u17">U17</option>
        <option value="u15">U15</option>
        <option value="u13">U13</option>
        <option value="u11">U11</option>
        <option value="u9">U9</option>
    </select>

    <button id="cycleBtn" class="auto-btn" onclick="startAutoCycle()">🔄 Auto-Durchlauf starten</button>

    <div id="lines-wrapper"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let players = {};
        let currentTeam = "2bundesliga";
        const posOrder = ['LW', 'RW', 'C', 'LD', 'RD', 'G'];

        function changeTeam() {
            currentTeam = document.getElementById('teamSelector').value;
            db.ref('teams/' + currentTeam + '/players').on('value', (snap) => {
                players = snap.val() || {};
                buildUI();
            });
        }

        function buildUI() {
            const wrapper = document.getElementById('lines-wrapper');
            wrapper.innerHTML = '';
            [1, 2, 3].forEach(line => {
                const section = document.createElement('div');
                section.className = 'line-section';
                section.innerHTML = `
                    <h2>Reihe ${line}</h2>
                    <div class="pitch">
                        <div class="pitch-row">${slot(line, 'LW')}${slot(line, 'RW')}</div>
                        <div class="pitch-row">${slot(line, 'C')}</div>
                        <div class="pitch-row">${slot(line, 'LD')}${slot(line, 'RD')}</div>
                        <div class="pitch-row">${slot(line, 'G')}</div>
                    </div>
                    <div class="controls">
                        <button class="btn btn-save" onclick="saveLine(${line})">Speichern</button>
                        <button class="btn btn-show" onclick="showLine(${line}, true)">Anzeigen</button>
                        <button class="btn btn-hide" onclick="showLine(${line}, false)" style="background:#444; color:white">Aus</button>
                    </div>
                `;
                wrapper.appendChild(section);
                loadSavedData(line);
            });
        }

        function slot(line, pos) {
            return `<div class="player-input-box"><label>${pos}</label><input type="number" id="nr-${line}-${pos}" oninput="autoComplete(${line}, '${pos}')"><span id="name-${line}-${pos}">-</span></div>`;
        }

        function autoComplete(line, pos) {
            const nr = document.getElementById(`nr-${line}-${pos}`).value;
            document.getElementById(`name-${line}-${pos}`).innerText = players[nr] || "-";
        }

        function saveLine(line) {
            const data = {};
            posOrder.forEach(pos => { data[pos] = document.getElementById(`name-${line}-${pos}`).innerText; });
            db.ref('teams/' + currentTeam + '/lineups/' + line).set(data);
        }

        function loadSavedData(line) {
            db.ref('teams/' + currentTeam + '/lineups/' + line).once('value', (snap) => {
                const data = snap.val() || {};
                posOrder.forEach(pos => {
                    const name = data[pos] || "";
                    if(name) {
                        document.getElementById(`name-${line}-${pos}`).innerText = name;
                        const nr = Object.keys(players).find(k => players[k] === name);
                        if(nr) document.getElementById(`nr-${line}-${pos}`).value = nr;
                    }
                });
            });
        }

        function showLine(line, visible) {
            db.ref('lineup_control').set({ activeLine: line, visible: visible, team: currentTeam });
        }

        async function startAutoCycle() {
            for (let i = 1; i <= 3; i++) {
                await db.ref('lineup_control').set({ activeLine: i, visible: true, team: currentTeam });
                await new Promise(r => setTimeout(r, 7000));
            }
            db.ref('lineup_control').set({ visible: false });
        }

        changeTeam();
    </script>
</body>
</html>
