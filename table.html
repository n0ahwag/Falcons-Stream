<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Tabelle Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');
        
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; font-family: 'Poppins', sans-serif; background: transparent; overflow: hidden; color: white; display: flex; align-items: center; justify-content: center; }

        #table-wrapper {
            width: 1200px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            padding: 40px;
            transform: translateY(50px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #table-wrapper.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        h1 {
            text-align: center;
            color: #ff4444;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-size: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 20px;
        }

        th {
            text-align: left;
            text-transform: uppercase;
            color: #777;
            font-size: 14px;
            padding: 10px;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #222;
        }

        .pos { width: 50px; font-weight: 900; color: #ff4444; }
        .team { font-weight: 500; font-size: 22px; }
        .stats { text-align: center; width: 80px; font-weight: 300; }
        .points { text-align: center; width: 100px; font-weight: 700; color: #ff4444; }

        tr:last-child td { border-bottom: none; }
        .highlight { background: rgba(255, 68, 68, 0.05); }
    </style>
</head>
<body>

    <div id="table-wrapper">
        <h1 id="league-title">2. FBL Herren Nord-West</h1>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Team</th>
                    <th style="text-align:center">Sp</th>
                    <th style="text-align:center">Diff</th>
                    <th style="text-align:center">Pkt</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Daten kommen aus Firebase -->
            </tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Sichtbarkeit steuern
        db.ref('table_control/visible').on('value', (snap) => {
            if (snap.val()) {
                document.getElementById('table-wrapper').classList.add('active');
            } else {
                document.getElementById('table-wrapper').classList.remove('active');
            }
        });

        // Daten laden
        db.ref('table_data').on('value', (snap) => {
            const data = snap.val();
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            if (data && data.standings) {
                data.standings.forEach(team => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="pos">${team.pos}</td>
                        <td class="team">${team.name}</td>
                        <td class="stats">${team.games}</td>
                        <td class="stats">${team.diff}</td>
                        <td class="points">${team.points}</td>
                    `;
                    body.appendChild(row);
                });
            }
        });
    </script>
</body>
</html>
