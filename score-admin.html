<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard Design Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 500px; margin-bottom: 20px; }
        
        /* Score-Buttons */
        .score-ctrl { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .score-display { font-size: 40px; font-weight: bold; color: #ff4444; }
        button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-plus { background: #ff4444; color: white; width: 50px; }

        /* Galerie */
        .gallery-item { 
            display: flex; align-items: center; background: #252525; 
            padding: 10px; margin: 10px 0; border-radius: 8px; 
            cursor: pointer; border: 2px solid transparent; 
        }
        .gallery-item:hover { border-color: #ff4444; }
        .gallery-item img { width: 100px; height: 50px; object-fit: contain; margin-right: 15px; background: #000; }
        .gallery-item.active { border-color: #00ff00; }

        input, button.save-btn { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Spielstand</h2>
        <div class="score-ctrl">
            <button class="btn-plus" onclick="changeScore('scoreA', 1)">+</button>
            <div class="score-display" id="dispA">0</div>
            <div style="font-size: 20px;">VS</div>
            <div class="score-display" id="dispB">0</div>
            <button class="btn-plus" onclick="changeScore('scoreB', 1)">+</button>
        </div>
        <button style="width:100%; background:#444; color:white;" onclick="resetScore()">Reset Score</button>
    </div>

    <div class="card">
        <h2>Design Galerie</h2>
        <div id="gallery">Lade Bilder...</div>
        
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        
        <h3>Neues Scoreboard hochladen</h3>
        <input type="text" id="imgName" placeholder="Name des Designs (z.B. FRA-TVE)">
        <input type="file" id="imgFile" accept="image/*">
        <button class="save-btn" style="background:#28a745; color:white;" onclick="uploadDesign()">In Galerie speichern</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scores = { scoreA: 0, scoreB: 0 };

        // Daten laden
        db.ref('scoreboard_active').on('value', snap => {
            const data = snap.val() || {};
            scores = { scoreA: data.scoreA || 0, scoreB: data.scoreB || 0 };
            document.getElementById('dispA').innerText = scores.scoreA;
            document.getElementById('dispB').innerText = scores.scoreB;
        });

        function changeScore(team, val) {
            db.ref('scoreboard_active/' + team).set(scores[team] + val);
        }

        function resetScore() { db.ref('scoreboard_active/scoreA').set(0); db.ref('scoreboard_active/scoreB').set(0); }

        // Galerie laden
        db.ref('score_designs').on('value', snap => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                const design = data[id];
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${design.img}"> <span>${design.name}</span>`;
                div.onclick = () => db.ref('scoreboard_active/img').set(design.img);
                gallery.appendChild(div);
            });
        });

        // Bild hochladen (Base64)
        function uploadDesign() {
            const name = document.getElementById('imgName').value;
            const file = document.getElementById('imgFile').files[0];
            if(!name || !file) return alert("Name und Datei wählen!");

            const reader = new FileReader();
            reader.onload = function(e) {
                db.ref('score_designs').push({ name: name, img: e.target.result });
                alert("Gespeichert!");
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
