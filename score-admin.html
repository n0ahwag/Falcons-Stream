<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard & Kombi-Hotkeys</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { color: #ff4444; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .score-ctrl { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .score-display { font-size: 60px; font-weight: 700; color: #ff4444; }
        button { padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        
        /* Hotkey Editor Styles */
        .hotkey-item { display: flex; justify-content: space-between; align-items: center; background: #252525; padding: 10px; margin: 5px 0; border-radius: 6px; }
        .key-badge { background: #444; color: #00ff00; padding: 4px 10px; border-radius: 4px; font-family: monospace; font-size: 12px; }
        .btn-record { font-size: 11px; background: #333; color: #aaa; padding: 6px; border-radius: 4px; border: 1px solid #555; }
        .btn-record.active { background: #ff4444; color: white; animation: blink 1s infinite; border-color: white; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .nav-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { color: #888; text-decoration: none; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="admin.html" class="back-btn">← Zurück</a>
        <span style="color:#ff4444; font-weight:bold;">Kombi-Hotkeys Setup</span>
    </div>

    <div class="card">
        <h2>Live Spielstand</h2>
        <div class="score-ctrl">
            <div style="text-align:center">
                <button style="background:#ff4444; color:white; width:60px" onclick="changeScore('scoreA', 1)">+</button><br>
                <div class="score-display" id="dispA">0</div>
                <button style="background:#444; color:white; width:40px" onclick="changeScore('scoreA', -1)">-</button>
            </div>
            <div style="font-size: 24px; color:#444">VS</div>
            <div style="text-align:center">
                <button style="background:#ff4444; color:white; width:60px" onclick="changeScore('scoreB', 1)">+</button><br>
                <div class="score-display" id="dispB">0</div>
                <button style="background:#444; color:white; width:40px" onclick="changeScore('scoreB', -1)">-</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Hotkeys (Kombinationen möglich)</h2>
        <p style="font-size: 10px; color: #777;">Klicke auf "Aufnahme" und drücke die Tastenkombination (z.B. Strg + Q).</p>
        <div id="hotkey-list">
            <div class="hotkey-item"><span>Heim +1</span><div><span class="key-badge" id="key-A-plus">...</span><button class="btn-record" onclick="startRecord('A-plus')">Aufnahme</button></div></div>
            <div class="hotkey-item"><span>Heim -1</span><div><span class="key-badge" id="key-A-minus">...</span><button class="btn-record" onclick="startRecord('A-minus')">Aufnahme</button></div></div>
            <div class="hotkey-item"><span>Gast +1</span><div><span class="key-badge" id="key-B-plus">...</span><button class="btn-record" onclick="startRecord('B-plus')">Aufnahme</button></div></div>
            <div class="hotkey-item"><span>Gast -1</span><div><span class="key-badge" id="key-B-minus">...</span><button class="btn-record" onclick="startRecord('B-minus')">Aufnahme</button></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scores = { scoreA: 0, scoreB: 0 };
        let activeHotkeys = {};
        let recordingAction = null;

        // Sync Score
        db.ref('scoreboard_active').on('value', snap => {
            const data = snap.val() || {};
            scores = { scoreA: data.scoreA || 0, scoreB: data.scoreB || 0 };
            document.getElementById('dispA').innerText = scores.scoreA;
            document.getElementById('dispB').innerText = scores.scoreB;
        });

        // Sync Hotkeys
        db.ref('hotkey_config').on('value', snap => {
            activeHotkeys = snap.val() || {};
            Object.keys(activeHotkeys).forEach(id => {
                const el = document.getElementById('key-' + id);
                if(el) el.innerText = activeHotkeys[id].display || "...";
            });
        });

        function changeScore(team, val) {
            db.ref('scoreboard_active/' + team).set(Math.max(0, scores[team] + val));
        }

        function startRecord(action) {
            recordingAction = action;
            document.querySelectorAll('.btn-record').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Hilfsfunktion: Taste in String umwandeln (z.B. "ctrl+shift+q")
        function getComboString(e) {
            let combo = [];
            if (e.ctrlKey) combo.push('ctrl');
            if (e.shiftKey) combo.push('shift');
            if (e.altKey) combo.push('alt');
            if (!['Control', 'Shift', 'Alt'].includes(e.key)) {
                combo.push(e.key.toLowerCase());
            }
            return {
                id: combo.join('+'),
                display: combo.join(' + ').toUpperCase()
            };
        }

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            if (recordingAction) {
                e.preventDefault();
                const combo = getComboString(e);
                if (combo.id === "") return; // Nur Modifikatoren gedrückt
                
                db.ref('hotkey_config/' + recordingAction).set(combo);
                recordingAction = null;
                document.querySelectorAll('.btn-record').forEach(b => b.classList.remove('active'));
                return;
            }

            const pressed = getComboString(e).id;
            Object.keys(activeHotkeys).forEach(action => {
                if (activeHotkeys[action].id === pressed) {
                    e.preventDefault();
                    if (action === 'A-plus') changeScore('scoreA', 1);
                    if (action === 'A-minus') changeScore('scoreA', -1);
                    if (action === 'B-plus') changeScore('scoreB', 1);
                    if (action === 'B-minus') changeScore('scoreB', -1);
                }
            });
        });
    </script>
</body>
</html>
