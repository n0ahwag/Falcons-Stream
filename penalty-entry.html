<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schnelle Straf-Eingabe</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid #ff4444; width: 90%; max-width: 320px; text-align: center; }
        h2 { font-size: 18px; text-transform: uppercase; color: #ff4444; margin-top: 0; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff4444; }
        button { width: 100%; padding: 15px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        #playerName { display: block; color: #888; font-size: 12px; height: 18px; margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚠️ Zeitstrafe</h2>
        <input type="number" id="penNr" placeholder="Spieler Nr." autofocus oninput="findP(this)">
        <span id="playerName">-</span>
        <select id="penDur">
            <option value="2'">2 Min</option>
            <option value="2'+2'">2+2 Min</option>
            <option value="10'">10 Min</option>
            <option value="MS">MS</option>
        </select>
        <button onclick="send()">Strafe abschicken</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Team aus URL holen
        const urlParams = new URLSearchParams(window.location.search);
        const team = urlParams.get('team') || '2bundesliga';

        let players = {};
        db.ref('teams/' + team + '/players').on('value', snap => { players = snap.val() || {}; });

        function findP(input) {
            document.getElementById('playerName').innerText = players[input.value] || "-";
        }

        function send() {
            const nr = document.getElementById('penNr').value;
            const name = players[nr];
            const dur = document.getElementById('penDur').value;

            if (!name) return alert("Ungültige Nummer!");

            db.ref('lastEvent').set({
                type: 'penalty',
                player: name,
                duration: dur,
                timestamp: Date.now()
            }).then(() => {
                // Fenster nach Erfolg schließen
                window.close();
            });
        }
    </script>
</body>
</html>
