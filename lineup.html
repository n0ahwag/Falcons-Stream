<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Lineup Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap');
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; font-family: 'Poppins', sans-serif; background: transparent; overflow: hidden; color: white; }
        
        #lineup-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.8s ease;
        }
        #lineup-screen.active { opacity: 1; visibility: visible; }

        .title { font-size: 50px; font-weight: 800; text-transform: uppercase; color: #ff4444; letter-spacing: 10px; margin-bottom: 50px; }

        .field { position: relative; width: 900px; height: 750px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .row { display: flex; justify-content: center; gap: 150px; width: 100%; }

        .player-card {
            background: rgba(255, 255, 255, 0.05); border-bottom: 4px solid #ff4444;
            padding: 20px; width: 240px; text-align: center; border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .pos-label { font-size: 13px; color: #ff4444; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .name { font-size: 22px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }

        .goalie-area { margin-top: 40px; }
    </style>
</head>
<body>

    <div id="lineup-screen">
        <div class="title" id="line-title">REIHE 1</div>
        
        <div class="field">
            <!-- Stürmer -->
            <div class="row">
                <div class="player-card"><div class="pos-label">LW</div><div id="p-LW" class="name">-</div></div>
                <div class="player-card"><div class="pos-label">RW</div><div id="p-RW" class="name">-</div></div>
            </div>
            <!-- Center -->
            <div class="row">
                <div class="player-card"><div class="pos-label">C</div><div id="p-C" class="name">-</div></div>
            </div>
            <!-- Verteidiger -->
            <div class="row">
                <div class="player-card"><div class="pos-label">LD</div><div id="p-LD" class="name">-</div></div>
                <div class="player-card"><div class="pos-label">RD</div><div id="p-RD" class="name">-</div></div>
            </div>
            <!-- Goalie -->
            <div class="goalie-area">
                <div class="player-card" style="border-color: white;"><div class="pos-label" style="color: white;">G</div><div id="p-G" class="name">-</div></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Überwacht die Steuerung (Einblenden/Ausblenden)
        db.ref('lineup_control').on('value', (snap) => {
            const ctrl = snap.val();
            if (ctrl && ctrl.visible) {
                // Wenn sichtbar, lade die Daten für das spezifische Team und die Reihe
                updateDisplay(ctrl.team || "2bundesliga", ctrl.activeLine || 1);
                document.getElementById('lineup-screen').classList.add('active');
            } else {
                document.getElementById('lineup-screen').classList.remove('active');
            }
        });

        function updateDisplay(team, lineNr) {
            // Titel setzen
            document.getElementById('line-title').innerText = 'REIHE ' + lineNr;
            
            // Daten aus dem Team-Pfad laden
            db.ref('teams/' + team + '/lineups/' + lineNr).once('value', (lineSnap) => {
                const data = lineSnap.val() || {};
                const positions = ['LW', 'RW', 'C', 'LD', 'RD', 'G'];
                
                positions.forEach(pos => {
                    const el = document.getElementById('p-' + pos);
                    if (el) {
                        el.innerText = data[pos] || '-';
                    }
                });
            });
        }
    </script>
</body>
</html>
