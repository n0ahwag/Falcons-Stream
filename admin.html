<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Steuerung</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 18px; color: #ff4444; margin: 0; text-transform: uppercase; }
        .nav-link { color: #888; text-decoration: none; font-size: 12px; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; }
        .nav-link:hover { border-color: #ff4444; color: #ff4444; }

        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 360px; margin-bottom: 20px; }
        h2 { color: #eee; font-size: 14px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        label { color: #666; font-size: 10px; text-transform: uppercase; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; font-size: 14px; }
        .input-row { display: flex; gap: 10px; }
        .nr-field { width: 80px; }
        
        button { width: 100%; padding: 14px; background: #ff4444; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Steuerung</h1>
        <a href="management.html" class="nav-link">Team verwalten</a>
    </div>

    <div class="card">
        <h2>⚽ Tor</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="goalNr" placeholder="Nr." oninput="findPlayer(this, 'goalName')">
            <input type="text" id="goalName" placeholder="Torschütze...">
        </div>
        <div class="input-row">
            <input type="number" class="nr-field" id="assistNr" placeholder="Nr." oninput="findPlayer(this, 'assistName')">
            <input type="text" id="assistName" placeholder="Assist...">
        </div>
        <button onclick="sendEvent('goal')">Tor anzeigen</button>
    </div>

    <div class="card">
        <h2>⚠️ Strafe</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="penNr" placeholder="Nr." oninput="findPlayer(this, 'penName')">
            <input type="text" id="penName" placeholder="Spieler...">
        </div>
        <select id="penDur">
            <option value="2'">2 Min</option>
            <option value="2'+2'">2+2 Min</option>
            <option value="10'">10 Min</option>
            <option value="MS">MS</option>
        </select>
        <button style="background: #444;" onclick="sendEvent('penalty')">Strafe anzeigen</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let players = {};
        db.ref('players').on('value', (snap) => { players = snap.val() || {}; });

        function findPlayer(input, targetId) {
            if (players[input.value]) {
                document.getElementById(targetId).value = players[input.value];
            }
        }

        function sendEvent(type) {
            if (type === 'goal') {
                const name = document.getElementById('goalName').value;
                const assist = document.getElementById('assistName').value;
                if (!name) return;
                db.ref('lastEvent').set({ type: 'goal', player: name, assist: assist, timestamp: Date.now() });
            } else {
                const name = document.getElementById('penName').value;
                const dur = document.getElementById('penDur').value;
                if (!name) return;
                db.ref('lastEvent').set({ type: 'penalty', player: name, duration: dur, timestamp: Date.now() });
            }
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    </script>
</body>
</html>
