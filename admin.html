<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 20px; color: #ff4444; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .team-select { width: 100%; max-width: 400px; padding: 15px; background: #ff4444; border: none; border-radius: 8px; color: white; font-weight: bold; margin-bottom: 20px; font-size: 16px; font-family: inherit; }
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 25px; }
        .nav-btn { padding: 12px; background: #222; border: 1px solid #444; color: #ccc; text-decoration: none; text-align: center; border-radius: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .nav-btn:hover { border-color: #ff4444; color: #ff4444; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 360px; margin-bottom: 20px; }
        h2 { color: #eee; font-size: 14px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .input-row { display: flex; gap: 10px; }
        .nr-field { width: 80px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 14px; background: #ff4444; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Floorball Control</h1>

    <select id="teamSelector" class="team-select" onchange="updateTeam()">
        <option value="2bundesliga">2. Bundesliga</option>
        <option value="regio">Regio</option>
        <option value="u17">U17</option>
        <option value="u15">U15</option>
        <option value="u13">U13</option>
        <option value="u11">U11</option>
        <option value="u9">U9</option>
    </select>

    <div class="admin-nav">
        <a href="management.html" class="nav-btn">👥 Team</a>
        <a href="lineup-admin.html" class="nav-btn">📋 Aufstellung</a>
        <a href="score-admin.html" class="nav-btn">🏆 Scoreboard</a>
        <a href="help.html" class="nav-btn" style="color:#555">❓ Hilfe</a>
    </div>

    <div class="card">
        <h2>⚽ Tor (Heim +1)</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="goalNr" placeholder="Nr." oninput="findP(this, 'goalName')">
            <input type="text" id="goalName" placeholder="Torschütze...">
        </div>
        <div class="input-row">
            <input type="number" class="nr-field" id="assistNr" placeholder="Nr." oninput="findP(this, 'assistName')">
            <input type="text" id="assistName" placeholder="Assist...">
        </div>
        <button class="action-btn" onclick="send('goal')">Tor & Heim Score +1</button>
    </div>

    <div class="card">
        <h2>⚠️ Strafe</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="penNr" placeholder="Nr." oninput="findP(this, 'penName')">
            <input type="text" id="penName" placeholder="Spieler...">
        </div>
        <select id="penDur">
            <option value="2'">2 Min</option>
            <option value="2'+2'">2+2 Min</option>
            <option value="10'">10 Min</option>
            <option value="MS">MS</option>
        </select>
        <button class="action-btn" style="background:#444" onclick="send('penalty')">Strafe anzeigen</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let players = {};
        let currentT = "2bundesliga";
        let curS = { scoreA: 0, scoreB: 0 };
        let activeHotkeys = {};

        // Sync Score & Hotkeys
        db.ref('scoreboard_active').on('value', s => { curS = s.val() || {scoreA:0, scoreB:0}; });
        db.ref('hotkey_config').on('value', s => { activeHotkeys = s.val() || { 'A-plus': 'q', 'A-minus': 'a', 'B-plus': 'w', 'B-minus': 's' }; });

        function updateTeam() {
            currentT = document.getElementById('teamSelector').value;
            db.ref('teams/' + currentT + '/players').on('value', snap => { players = snap.val() || {}; });
        }

        function findP(input, target) { document.getElementById(target).value = players[input.value] || ""; }

        function send(type) {
            let data = { timestamp: Date.now(), type: type };
            if(type === 'goal') {
                data.player = document.getElementById('goalName').value;
                data.assist = document.getElementById('assistName').value;
                if(!data.player) return;
                // Auto Score
                db.ref('scoreboard_active/scoreA').set((curS.scoreA || 0) + 1);
            } else {
                data.player = document.getElementById('penName').value;
                data.duration = document.getElementById('penDur').value;
                if(!data.player) return;
            }
            db.ref('lastEvent').set(data);
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        // Global Hotkey Listener
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const key = e.key.toLowerCase();
            if (key === activeHotkeys['A-plus']) db.ref('scoreboard_active/scoreA').set((curS.scoreA || 0) + 1);
            if (key === activeHotkeys['A-minus']) db.ref('scoreboard_active/scoreA').set(Math.max(0, (curS.scoreA || 0) - 1));
            if (key === activeHotkeys['B-plus']) db.ref('scoreboard_active/scoreB').set((curS.scoreB || 0) + 1);
            if (key === activeHotkeys['B-minus']) db.ref('scoreboard_active/scoreB').set(Math.max(0, (curS.scoreB || 0) - 1));
        });

        updateTeam();
    </script>
</body>
</html>
