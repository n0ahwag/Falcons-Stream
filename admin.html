<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tor Steuerung</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        h2 { color: #ffd700; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #ffd700; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); background: #e6c200; }
        #status { text-align: center; margin-top: 15px; color: #00ff00; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚽ Tor Steuerung</h2>
        <input type="text" id="scorer" placeholder="Torschütze" autocomplete="off">
        <input type="text" id="assist" placeholder="Assist (optional)" autocomplete="off">
        <button onclick="sendGoal()">TOR ANZEIGEN</button>
        <div id="status">Gesendet! ✅</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendGoal() {
            const sc = document.getElementById('scorer').value;
            const as = document.getElementById('assist').value;
            const status = document.getElementById('status');

            if (!sc) return alert("Bitte Torschützen eingeben!");

            db.ref('lastGoal').set({
                scorer: sc,
                assist: as,
                timestamp: Date.now()
            }).then(() => {
                status.style.display = "block";
                setTimeout(() => status.style.display = "none", 2000);
                document.getElementById('scorer').value = '';
                document.getElementById('assist').value = '';
            }).catch(err => alert("Fehler: " + err.message));
        }
    </script>
</body>
</html>
