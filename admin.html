<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Tor Steuerung</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 40px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #ffd700; text-align: center; margin-bottom: 25px; }
        label { color: #888; font-size: 12px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin: 8px 0 20px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #ffd700; outline: none; }
        button { width: 100%; padding: 15px; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        #status-msg { text-align: center; margin-top: 15px; color: #00ff00; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚽ Tor Steuerung</h2>
        
        <label>Torschütze</label>
        <input type="text" id="scorer" placeholder="Name eingeben..." autocomplete="off">
        
        <label>Assist</label>
        <input type="text" id="assist" placeholder="Name eingeben (optional)..." autocomplete="off">
        
        <button onclick="sendGoal()">TOR ANZEIGEN</button>
        <div id="status-msg">Gesendet! ✅</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.firebaseio.com",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendGoal() {
            const sc = document.getElementById('scorer').value;
            const as = document.getElementById('assist').value;
            const status = document.getElementById('status-msg');

            if (!sc) return alert("Bitte mindestens einen Torschützen eingeben!");

            db.ref('lastGoal').set({
                scorer: sc,
                assist: as,
                timestamp: Date.now()
            }).then(() => {
                // Erfolg anzeigen
                status.style.display = "block";
                setTimeout(() => status.style.display = "none", 2000);
                
                // Felder leeren
                document.getElementById('scorer').value = '';
                document.getElementById('assist').value = '';
            }).catch(err => alert("Fehler: " + err.message));
        }
    </script>
</body>
</html>
