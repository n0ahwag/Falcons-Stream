<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floorball Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 18px; color: #ff4444; margin: 10px 0 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        .team-select { width: 100%; max-width: 400px; padding: 15px; background: #ff4444; border: none; border-radius: 10px; color: white; font-weight: bold; margin-bottom: 20px; font-size: 16px; cursor: pointer; }
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 25px; }
        .nav-btn { padding: 12px; background: #1e1e1e; border: 1px solid #333; color: #bbb; text-decoration: none; text-align: center; border-radius: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .nav-btn:hover { border-color: #ff4444; color: #ff4444; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 360px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h2 { color: #eee; font-size: 13px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; font-size: 14px; outline: none; }
        .input-row { display: flex; gap: 10px; }
        .nr-field { width: 70px; }
        .action-btn { width: 100%; padding: 15px; background: #ff4444; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Floorball Control</h1>

    <select id="teamSelector" class="team-select" onchange="updateTeam()">
        <option value="2bundesliga">2. Bundesliga</option>
        <option value="regio">Regio</option>
        <option value="u17">U17</option>
        <option value="u15">U15</option>
        <option value="u13">U13</option>
        <option value="u11">U11</option>
        <option value="u9">U9</option>
    </select>

    <div class="admin-nav">
        <a href="management.html" class="nav-btn">👥 Team</a>
        <a href="lineup-admin.html" class="nav-btn">📋 Aufstellung</a>
        <a href="score-admin.html" class="nav-btn">🏆 Score</a>
        <a href="help.html" class="nav-btn">❓ Hilfe</a>
        <a href="settings.html" class="nav-btn" style="grid-column: span 2; background: #222;">⚙️ Einstellungen & Hotkeys</a>
    </div>

    <div class="card">
        <h2>⚽ Tor (Heim +1)</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="goalNr" placeholder="Nr." oninput="findP(this, 'goalName')">
            <input type="text" id="goalName" placeholder="Torschütze...">
        </div>
        <div class="input-row">
            <input type="number" class="nr-field" id="assistNr" placeholder="Nr." oninput="findP(this, 'assistName')">
            <input type="text" id="assistName" placeholder="Assist...">
        </div>
        <button class="action-btn" onclick="send('goal')">Tor & Heim Score +1</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let players = {}, currentT = "2bundesliga", curS = {scoreA:0, scoreB:0}, hks = {};

        db.ref('scoreboard_active').on('value', s => { curS = s.val() || {scoreA:0, scoreB:0}; });
        db.ref('hotkey_config').on('value', s => { hks = s.val() || {}; });

        function updateTeam() {
            currentT = document.getElementById('teamSelector').value;
            db.ref('teams/' + currentT + '/players').on('value', snap => { players = snap.val() || {}; });
        }
        function findP(input, target) { document.getElementById(target).value = players[input.value] || ""; }

        function send(type) {
            let data = { timestamp: Date.now(), type: type };
            if(type === 'goal') {
                data.player = document.getElementById('goalName').value;
                data.assist = document.getElementById('assistName').value;
                if(!data.player) return;
                db.ref('scoreboard_active/scoreA').set((curS.scoreA || 0) + 1);
            }
            db.ref('lastEvent').set(data);
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        // --- Suche im <script> Teil der admin.html den Hotkey-Bereich und ersetze ihn hierdurch: ---

            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                if (['Control', 'Shift', 'Alt', 'AltGraph', 'Meta'].includes(e.key)) return;
            
                let c = [];
                if (e.ctrlKey) c.push('ctrl');
                if (e.shiftKey) c.push('shift');
                if (e.altKey) c.push('alt');
                c.push(e.key.toLowerCase());
                const pressed = c.join('+');
            
                Object.keys(hks).forEach(act => {
                    if (hks[act].id === pressed) {
                        e.preventDefault();
            
                        // Check if it's a Penalty Hotkey
                        if (act.startsWith('Pen-')) {
                            let duration = "";
                            if(act === 'Pen-2') duration = "2'";
                            if(act === 'Pen-2-2') duration = "2'+2'";
                            if(act === 'Pen-10') duration = "10'";
                            if(act === 'Pen-MS') duration = "MS";
            
                            window.open(`penalty-entry.html?team=${currentT}&dur=${encodeURIComponent(duration)}`, 
                                        'strafePopup', 'width=400,height=550');
                        } else {
                            // Normal Score Hotkeys
                            let team = act.includes('A') ? 'scoreA' : 'scoreB';
                            let mod = act.includes('plus') ? 1 : -1;
                            db.ref('scoreboard_active/' + team).set(Math.max(0, (curS[team] || 0) + mod));
                        }
                    }
                });
            });

        updateTeam();
    </script>
</body>
</html>
