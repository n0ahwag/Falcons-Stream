<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bild-Scoreboard Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap');
        
        body { margin: 0; padding: 0; background: transparent; font-family: 'Poppins', sans-serif; overflow: hidden; }

        #scoreboard-container {
            position: absolute;
            top: 40px;
            left: 40px;
            display: inline-block;
        }

        #scoreboard-img {
            display: block;
            height: 120px; /* Höhe für beide Zeilen zusammen */
            width: auto;
        }

        /* Container für die Score-Zahlen */
        .score-box {
            position: absolute;
            right: 0;
            width: 75px; /* Breite der dunklen Box im Bild */
            height: 60px; /* Höhe einer einzelnen Zeile */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 36px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Exakte Positionierung auf den dunklen Flächen */
        #scoreA { top: 0; }
        #scoreB { top: 60px; }
    </style>
</head>
<body>

    <div id="scoreboard-container">
        <img id="scoreboard-img" src="">
        <div id="scoreA" class="score-box">0</div>
        <div id="scoreB" class="score-box">0</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('scoreboard_active').on('value', (snap) => {
            const data = snap.val() || {};
            if(data.img) document.getElementById('scoreboard-img').src = data.img;
            document.getElementById('scoreA').innerText = data.scoreA || 0;
            document.getElementById('scoreB').innerText = data.scoreB || 0;
        });
    </script>
</body>
</html>
