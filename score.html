<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bild-Scoreboard Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap');
        
        body { margin: 0; padding: 0; background: transparent; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Das Scoreboard-Bild als Container */
        #scoreboard-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: auto;
            height: auto;
            display: inline-block;
        }

        #scoreboard-img {
            display: block;
            max-width: 500px; /* Du kannst die Größe hier anpassen */
        }

        /* Die Zahlen auf dem Bild positionieren */
        .score {
            position: absolute;
            color: white;
            font-size: 38px;
            font-weight: 800;
            width: 80px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Position der Zahlen (Anpassung an dein Bild-Design) */
        #scoreA {
            right: 0px; 
            top: 10px; /* Höhe für das obere Team (FRA) */
        }

        #scoreB {
            right: 0px; 
            top: 75px; /* Höhe für das untere Team (TVE) */
        }
    </style>
</head>
<body>

    <div id="scoreboard-container">
        <!-- Das Bild, das du hochlädst -->
        <img id="scoreboard-img" src="">
        
        <!-- Die Live-Zahlen darüber -->
        <div id="scoreA" class="score">0</div>
        <div id="scoreB" class="score">0</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('scoreboard_active').on('value', (snap) => {
            const data = snap.val() || {};
            document.getElementById('scoreboard-img').src = data.img || "";
            document.getElementById('scoreA').innerText = data.scoreA || 0;
            document.getElementById('scoreB').innerText = data.scoreB || 0;
        });
    </script>
</body>
</html>
