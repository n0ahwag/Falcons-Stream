<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 18px; color: #ff4444; margin: 0; text-transform: uppercase; }
        .nav-link { color: #888; text-decoration: none; font-size: 12px; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; }

        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 360px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #eee; font-size: 13px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; opacity: 0.7; }
        
        .input-row { display: flex; gap: 10px; }
        .nr-field { width: 80px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; font-size: 14px; }
        
        .add-btn { width: 100%; padding: 12px; background: #ff4444; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 13px; }
        .player-item b { color: #ff4444; width: 35px; display: inline-block; }
        .del-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        #list { min-height: 50px; }
        .empty-msg { color: #555; text-align: center; font-size: 12px; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Team Liste</h1>
        <a href="admin.html" class="nav-link">← Zurück</a>
    </div>

    <div class="card">
        <h2>Spieler hinzufügen</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="newNr" placeholder="Nr.">
            <input type="text" id="newName" placeholder="Name...">
        </div>
        <button class="add-btn" onclick="addPlayer()">Speichern</button>
    </div>

    <div class="card">
        <h2>Aktueller Kader</h2>
        <div id="list"><div class="empty-msg">Verbinde zur Datenbank...</div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Live-Update der Liste
        db.ref('players').on('value', (snap) => {
            const list = document.getElementById('list');
            const data = snap.val();
            
            if (!data) {
                list.innerHTML = `<div class="empty-msg">Keine Spieler im Kader gefunden.</div>`;
                return;
            }

            list.innerHTML = '';
            Object.keys(data).sort((a,b) => a-b).forEach(nr => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `
                    <span><b>#${nr}</b> ${data[nr]}</span>
                    <button class="del-btn" onclick="del('${nr}')">✕</button>
                `;
                list.appendChild(item);
            });
        }, (error) => {
            document.getElementById('list').innerHTML = `<div class="empty-msg" style="color:red">Fehler: ${error.message}</div>`;
        });

        function addPlayer() {
            const nr = document.getElementById('newNr').value;
            const name = document.getElementById('newName').value;
            if (nr && name) {
                db.ref('players/' + nr).set(name);
                document.getElementById('newNr').value = '';
                document.getElementById('newName').value = '';
            } else {
                alert("Bitte Nummer und Namen eingeben.");
            }
        }

        function del(nr) {
            if(confirm("Spieler #" + nr + " wirklich löschen?")) {
                db.ref('players/' + nr).remove();
            }
        }
    </script>
</body>
</html>
