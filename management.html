<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Team Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 18px; color: #ff4444; margin: 0; text-transform: uppercase; }
        .nav-link { color: #888; text-decoration: none; font-size: 12px; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; }

        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 360px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        .input-row { display: flex; gap: 10px; }
        .nr-field { width: 80px; }
        
        button.add-btn { width: 100%; padding: 12px; background: #ff4444; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .player-list { margin-top: 20px; border-top: 1px solid #333; width: 100%; }
        .player-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .player-item b { color: #ff4444; width: 30px; display: inline-block; }
        .del-btn { color: #ff4444; cursor: pointer; background: none; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Team Management</h1>
        <a href="admin.html" class="nav-link">Zurück zur Steuerung</a>
    </div>

    <div class="card">
        <div class="input-row">
            <input type="number" class="nr-field" id="newNr" placeholder="Nr.">
            <input type="text" id="newName" placeholder="Vollständiger Name...">
        </div>
        <button class="add-btn" onclick="addPlayer()">Spieler speichern</button>
    </div>

    <div class="card" style="max-height: 400px; overflow-y: auto;">
        <div id="list" class="player-list">Lade Spieler...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('players').on('value', (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).sort((a,b) => a-b).forEach(nr => {
                list.innerHTML += `<div class="player-item">
                    <span><b>#${nr}</b> ${data[nr]}</span>
                    <button class="del-btn" onclick="del('${nr}')">✕</button>
                </div>`;
            });
        });

        function addPlayer() {
            const nr = document.getElementById('newNr').value;
            const name = document.getElementById('newName').value;
            if (nr && name) {
                db.ref('players/' + nr).set(name);
                document.getElementById('newNr').value = '';
                document.getElementById('newName').value = '';
            }
        }

        function del(nr) {
            if(confirm("Spieler löschen?")) db.ref('players/' + nr).remove();
        }
    </script>
</body>
</html>
