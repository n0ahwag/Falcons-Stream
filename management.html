<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Team Management - MultiTeam</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h1 { font-size: 18px; color: #ff4444; margin: 0; text-transform: uppercase; }
        .nav-link { color: #888; text-decoration: none; font-size: 12px; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; }
        
        select.team-select { width: 100%; max-width: 400px; padding: 12px; background: #ff4444; border: none; border-radius: 8px; color: white; font-weight: bold; margin-bottom: 20px; font-family: inherit; }
        
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 360px; margin-bottom: 20px; }
        h2 { color: #eee; font-size: 13px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; opacity: 0.7; }
        .input-row { display: flex; gap: 10px; }
        .nr-field { width: 80px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        .add-btn { width: 100%; padding: 12px; background: #ff4444; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 13px; }
        .player-item b { color: #ff4444; width: 35px; display: inline-block; }
        .del-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Team Liste</h1>
        <a href="admin.html" class="nav-link">← Zurück</a>
    </div>

    <select id="teamSelector" class="team-select" onchange="changeTeam()">
        <option value="2bundesliga">2. Bundesliga</option>
        <option value="regio">Regio</option>
        <option value="u17">U17</option>
        <option value="u15">U15</option>
        <option value="u13">U13</option>
        <option value="u11">U11</option>
        <option value="u9">U9</option>
    </select>

    <div class="card">
        <h2>Spieler hinzufügen</h2>
        <div class="input-row">
            <input type="number" class="nr-field" id="newNr" placeholder="Nr.">
            <input type="text" id="newName" placeholder="Name...">
        </div>
        <button class="add-btn" onclick="addPlayer()">Speichern</button>
    </div>

    <div class="card">
        <h2 id="currentTeamTitle">Kader</h2>
        <div id="list">Lade...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentTeam = "2bundesliga";

        function changeTeam() {
            currentTeam = document.getElementById('teamSelector').value;
            document.getElementById('currentTeamTitle').innerText = "Kader: " + document.getElementById('teamSelector').options[document.getElementById('teamSelector').selectedIndex].text;
            loadPlayers();
        }

        function loadPlayers() {
            // Falls 2. Bundesliga, schauen wir auch im alten Pfad nach, falls der neue leer ist
            let path = 'teams/' + currentTeam + '/players';
            
            db.ref(path).on('value', (snap) => {
                let data = snap.val();
                
                // Sonderlogik für den ersten Start: Wenn 2. Bundesliga leer ist, nimm die alten globalen Daten
                if (!data && currentTeam === "2bundesliga") {
                    db.ref('players').once('value', (oldSnap) => {
                        if(oldSnap.val()) {
                            db.ref(path).set(oldSnap.val()); // Migriere Daten
                        }
                    });
                }

                const list = document.getElementById('list');
                list.innerHTML = '';
                if (!data) { list.innerHTML = 'Keine Spieler gefunden.'; return; }
                
                Object.keys(data).sort((a,b) => a-b).forEach(nr => {
                    list.innerHTML += `<div class="player-item">
                        <span><b>#${nr}</b> ${data[nr]}</span>
                        <button class="del-btn" onclick="del('${nr}')">✕</button>
                    </div>`;
                });
            });
        }

        function addPlayer() {
            const nr = document.getElementById('newNr').value;
            const name = document.getElementById('newName').value;
            if (nr && name) {
                db.ref('teams/' + currentTeam + '/players/' + nr).set(name);
                document.getElementById('newNr').value = '';
                document.getElementById('newName').value = '';
            }
        }

        function del(nr) {
            if(confirm("Löschen?")) db.ref('teams/' + currentTeam + '/players/' + nr).remove();
        }

        loadPlayers();
               // --- UNIVERSAL COMBO-HOTKEY LISTENER ---
            let _curS = {scoreA:0, scoreB:0}, _hks = {};
            db.ref('scoreboard_active').on('value', s => { _curS = s.val() || {scoreA:0, scoreB:0}; });
            db.ref('hotkey_config').on('value', s => { _hks = s.val() || {}; });
            
            function _getCombo(e) {
                let c = [];
                if (e.ctrlKey) c.push('ctrl');
                if (e.shiftKey) c.push('shift');
                if (e.altKey) c.push('alt');
                if (!['Control', 'Shift', 'Alt'].includes(e.key)) c.push(e.key.toLowerCase());
                return c.join('+');
            }
            
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                const pressed = _getCombo(e);
                Object.keys(_hks).forEach(act => {
                    if (_hks[act].id === pressed) {
                        e.preventDefault();
                        let team = act.includes('A') ? 'scoreA' : 'scoreB';
                        let val = act.includes('plus') ? 1 : -1;
                        db.ref('scoreboard_active/' + team).set(Math.max(0, (_curS[team]||0) + val));
                    }
                });
            });
    </script>
</body>
</html>
