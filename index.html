<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OBS Tor Overlay</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: transparent; }

        #goal-container {
            position: absolute;
            top: 60px;
            right: -500px; /* Start außerhalb */
            width: 420px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            border-left: 10px solid #ffd700;
            color: white;
            padding: 25px;
            display: flex;
            align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 8px 0 0 8px;
        }

        #goal-container.active {
            right: 0px; /* Reinfahren */
        }

        .icon { font-size: 45px; margin-right: 25px; animation: bounce 2s infinite; }
        .goal-label { font-size: 13px; text-transform: uppercase; color: #ffd700; font-weight: 700; letter-spacing: 2px; }
        .scorer-name { font-size: 28px; font-weight: 900; line-height: 1.1; }
        .assist-name { font-size: 16px; color: #bbb; font-style: italic; margin-top: 4px; }

        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 5px;
            background: linear-gradient(90deg, #ffd700, #ff8800);
            width: 0%;
        }

        .active .progress-bar { animation: timer 5s linear forwards; }

        @keyframes timer { from { width: 100%; } to { width: 0%; } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <div id="goal-container">
        <div class="icon">⚽</div>
        <div class="text-content">
            <div class="goal-label">Tor erzielt</div>
            <div id="scorer" class="scorer-name">-</div>
            <div id="assist" class="assist-name">-</div>
        </div>
        <div class="progress-bar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('goal-container');
        
        // Verhindert das Aufploppen alter Tore beim Laden
        let initialLoad = true;

        db.ref('lastGoal').on('value', (snapshot) => {
            if (initialLoad) {
                initialLoad = false;
                return;
            }
            const data = snapshot.val();
            if (data && data.scorer) {
                document.getElementById('scorer').innerText = data.scorer;
                document.getElementById('assist').innerText = data.assist ? `Assist: ${data.assist}` : '';
                
                // Animation starten
                container.classList.add('active');
                
                // Nach 5 Sekunden ausblenden
                setTimeout(() => {
                    container.classList.remove('active');
                }, 5000);
            }
        });
    </script>
</body>
</html>
