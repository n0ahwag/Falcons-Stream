<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Overlay - Goal & Penalty</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: transparent; }

        #event-container {
            position: absolute;
            bottom: 12%; 
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            width: 380px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 6px;
            overflow: hidden;
        }

        #event-container.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Label Farbe ändert sich leicht bei Strafe */
        .event-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #ff4444; 
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 2px;
        }

        .player-name {
            font-size: 22px;
            font-weight: 500;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .detail-text {
            font-size: 14px;
            color: #aaa;
            font-weight: 300;
            font-style: italic;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #ff0000;
            width: 0%;
        }

        .active .progress-bar {
            animation: timer 5s linear forwards;
        }

        @keyframes timer {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>

    <div id="event-container">
        <div id="label" class="event-label">Ereignis</div>
        <div id="player" class="player-name">-</div>
        <div id="detail" class="detail-text">-</div>
        <div class="progress-bar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('event-container');
        
        let initialLoad = true;

        // Wir hören auf den Pfad "lastEvent"
        db.ref('lastEvent').on('value', (snapshot) => {
            if (initialLoad) {
                initialLoad = false;
                return;
            }
            const data = snapshot.val();
            if (data) {
                if (data.type === 'goal') {
                    document.getElementById('label').innerText = "Tor erzielt";
                    document.getElementById('label').style.color = "#ff4444";
                    document.getElementById('player').innerText = data.player;
                    document.getElementById('detail').innerText = data.assist ? `Assist: ${data.assist}` : "";
                } else if (data.type === 'penalty') {
                    document.getElementById('label').innerText = "Zeitstrafe";
                    document.getElementById('label').style.color = "#ffcc00"; // Gelb-Orange für Strafe
                    document.getElementById('player').innerText = data.player;
                    document.getElementById('detail').innerText = `Dauer: ${data.duration}`;
                }

                container.classList.add('active');
                setTimeout(() => { container.classList.remove('active'); }, 5000);
            }
        });
    </script>
</body>
</html>
