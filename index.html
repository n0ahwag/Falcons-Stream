<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Tor Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: transparent; }

        /* Positionierung: Unten Mittig, ca. 7/8 des Bildschirms */
        #goal-container {
            position: absolute;
            bottom: 12%; /* 7/8 Position von oben gesehen */
            left: 50%;
            transform: translateX(-50%) translateY(50px); /* Startet etwas tiefer */
            width: 500px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 8px solid #ff0000; /* Roter Balken unten */
            color: white;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 12px;
        }

        /* Wenn aktiv: Sanftes Einblenden und Hochfahren */
        #goal-container.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .goal-label {
            font-size: 14px;
            text-transform: uppercase;
            color: #ff0000; /* Floorball Rot */
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .scorer-name {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .assist-name {
            font-size: 18px;
            color: #bbb;
            font-style: italic;
        }

        /* Roter Fortschrittsbalken am Boden des Overlays */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 8px;
            background: #ff0000;
            width: 0%;
            border-radius: 0 0 12px 12px;
        }

        .active .progress-bar {
            animation: timer 5s linear forwards;
        }

        @keyframes timer {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>

    <div id="goal-container">
        <div class="goal-label">Tor erzielt</div>
        <div id="scorer" class="scorer-name">-</div>
        <div id="assist" class="assist-name">-</div>
        <div class="progress-bar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('goal-container');
        
        let initialLoad = true;

        db.ref('lastGoal').on('value', (snapshot) => {
            if (initialLoad) {
                initialLoad = false;
                return;
            }
            const data = snapshot.val();
            if (data && data.scorer) {
                document.getElementById('scorer').innerText = data.scorer;
                document.getElementById('assist').innerText = data.assist ? `Assist: ${data.assist}` : '';
                
                container.classList.add('active');
                
                setTimeout(() => {
                    container.classList.remove('active');
                }, 5000);
            }
        });
    </script>
</body>
</html>
