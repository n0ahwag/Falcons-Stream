<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OBS Tor Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: transparent; }
        #goal-container {
            position: absolute; top: 50px; right: -500px; width: 400px;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px);
            border-left: 8px solid #ffd700; color: white; padding: 20px;
            display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 5px 0 0 5px;
        }
        #goal-container.active { right: 0px; }
        .icon { font-size: 40px; margin-right: 20px; animation: bounce 2s infinite; }
        .text-content { flex-grow: 1; }
        .goal-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #ffd700; }
        .scorer-name { font-size: 24px; font-weight: 900; line-height: 1.1; }
        .assist-name { font-size: 14px; color: #ccc; font-style: italic; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #ffd700; width: 0%; }
        .active .progress-bar { animation: timer 5s linear forwards; }
        @keyframes timer { from { width: 100%; } to { width: 0%; } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>
    <div id="goal-container">
        <div class="icon">⚽</div>
        <div class="text-content">
            <div class="goal-label">Tor erzielt</div>
            <div id="scorer" class="scorer-name">-</div>
            <div id="assist" class="assist-name">-</div>
        </div>
        <div class="progress-bar"></div>
    </div>

    <script>
        const firebaseConfig = {
            // HIER DEINE DATEN VON FIREBASE EINFÜGEN:
              apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
              authDomain: "obs-overlay-2950c.firebaseapp.com",
              projectId: "obs-overlay-2950c",
              storageBucket: "obs-overlay-2950c.firebasestorage.app",
              messagingSenderId: "1094353952185",
              appId: "1:1094353952185:web:da70794c9e5104fda22a68",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('goal-container');
        
        // Verhindert das Anzeigen beim ersten Laden
        let initialLoad = true;

        db.ref('lastGoal').on('value', (snapshot) => {
            if (initialLoad) {
                initialLoad = false;
                return;
            }
            const data = snapshot.val();
            if (data) {
                document.getElementById('scorer').innerText = data.scorer;
                document.getElementById('assist').innerText = data.assist ? `Assist: ${data.assist}` : '';
                container.classList.add('active');
                setTimeout(() => container.classList.remove('active'), 5000);
            }
        });
    </script>
</body>
</html>
