<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Overlay Slim</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: transparent; }

        /* Schlankerer Container, unten mittig */
        #goal-container {
            position: absolute;
            bottom: 12%; 
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            width: 350px; /* Schmaler */
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px; /* Weniger klobig */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 6px; /* Eckiger/Moderner */
            overflow: hidden; /* Damit der Balken nicht übersteht */
        }

        #goal-container.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .goal-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #ff4444; /* Etwas helleres Rot für bessere Lesbarkeit */
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 2px;
        }

        .scorer-name {
            font-size: 20px; /* Kleinere Schrift */
            font-weight: 500; /* Dünnere Schrift */
            line-height: 1.2;
            margin-bottom: 0px;
        }

        .assist-name {
            font-size: 13px;
            color: #aaa;
            font-weight: 300;
            font-style: italic;
        }

        /* Nur der ablaufende Balken am unteren Rand */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px; /* Sehr dünner Balken */
            background: #ff0000;
            width: 0%;
        }

        .active .progress-bar {
            animation: timer 5s linear forwards;
        }

        @keyframes timer {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>

    <div id="goal-container">
        <div class="goal-label">Tor erzielt</div>
        <div id="scorer" class="scorer-name">-</div>
        <div id="assist" class="assist-name">-</div>
        <div class="progress-bar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfChQFOjIgBIcXPd57MTalvRrHFXr4UzM",
            authDomain: "obs-overlay-2950c.firebaseapp.com",
            databaseURL: "https://obs-overlay-2950c-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "obs-overlay-2950c",
            storageBucket: "obs-overlay-2950c.firebasestorage.app",
            messagingSenderId: "1094353952185",
            appId: "1:1094353952185:web:da70794c9e5104fda22a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('goal-container');
        
        let initialLoad = true;

        db.ref('lastGoal').on('value', (snapshot) => {
            if (initialLoad) {
                initialLoad = false;
                return;
            }
            const data = snapshot.val();
            if (data && data.scorer) {
                document.getElementById('scorer').innerText = data.scorer;
                document.getElementById('assist').innerText = data.assist ? `Assist: ${data.assist}` : '';
                
                container.classList.add('active');
                
                setTimeout(() => {
                    container.classList.remove('active');
                }, 5000);
            }
        });
    </script>
</body>
</html>
